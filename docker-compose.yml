version: '3.8'

services:
  comfyui:
    image: yanwk/comfyui-boot:latest
    container_name: comfyui
    expose:
      - "8188"
    restart: unless-stopped
    environment:
      - CLI_ARGS=--listen 0.0.0.0 --port 8188 --cpu
      - LOW_VRAM=true
    volumes:
      - comfyui-models:/app/models
      - comfyui-output:/app/output
      - comfyui-user:/app/user
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  comfyui-models:
  comfyui-output:
  comfyui-user:
